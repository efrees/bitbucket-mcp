name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # Windows is the priority runtime for this project, so CI runs there too.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
